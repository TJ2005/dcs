version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-victim-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.sentinel.service=backend"
      - "com.sentinel.description=Victim chatbot backend API"

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel-victim-frontend
    ports:
      - "9000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "com.sentinel.service=frontend"
      - "com.sentinel.description=Victim chatbot web interface"

networks:
  sentinel-network:
    driver: bridge
    name: sentinel-victim-network

# Optional: Add volumes for development
# volumes:
#   backend-data:
#     driver: local
